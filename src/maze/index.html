<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Runner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --ink: #182235;
        --muted: #657289;
        --line: #d8e0ea;
        --panel: #ffffff;
        --wall: #243142;
        --path: #f7fafc;
        --player: #0f9f8f;
        --exit: #ef8f24;
        --treasure: #f2c94c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        padding: 14px;
        background:
          linear-gradient(135deg, rgba(36, 49, 66, 0.12), transparent 42%),
          linear-gradient(315deg, rgba(15, 159, 143, 0.18), transparent 44%),
          #eef4f0;
        color: var(--ink);
      }

      main {
        width: min(820px, 100%);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(216, 224, 234, 0.95);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(24, 34, 53, 0.14);
      }

      .sidebar {
        padding: 12px;
        box-shadow: 0 10px 30px rgba(24, 34, 53, 0.08);
      }

      .stage {
        padding: clamp(12px, 2.6vw, 20px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 5vw, 2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .lede {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.9rem;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr)) minmax(120px, 0.5fr);
        gap: 10px;
        align-items: end;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        color: #344156;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7fafc;
      }

      .segmented.two {
        grid-template-columns: repeat(2, 1fr);
      }

      button {
        min-height: 34px;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .segmented button {
        background: transparent;
        color: var(--muted);
      }

      .segmented button.active {
        background: var(--player);
        color: #fff;
        box-shadow: 0 8px 18px rgba(15, 159, 143, 0.22);
      }

      .new-game {
        width: 100%;
        background: var(--wall);
        color: #fff;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-top: 10px;
      }

      .stats div {
        padding: 7px 6px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(251, 253, 255, 0.62);
        text-align: center;
      }

      .stats strong {
        display: block;
        font-size: 1rem;
      }

      .stats span {
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 800;
      }

      .status {
        min-height: 42px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        color: #344156;
        font-weight: 800;
      }

      .maze-wrap {
        width: min(92vw, calc(100dvh - 250px), 640px);
        max-width: 100%;
        margin-inline: auto;
      }

      .maze {
        display: grid;
        aspect-ratio: 1;
        width: 100%;
        overflow: hidden;
        border: 3px solid var(--wall);
        border-radius: 8px;
        background: var(--wall);
        touch-action: none;
      }

      .tile {
        position: relative;
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
      }

      .wall {
        background: var(--wall);
      }

      .path {
        background: var(--path);
      }

      .start {
        background: #dcefed;
      }

      .exit {
        background: #fff1df;
      }

      .exit::after {
        content: "";
        width: 52%;
        height: 52%;
        border-radius: 4px;
        background: var(--exit);
      }

      .treasure::before {
        content: "";
        width: 44%;
        height: 44%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #fff6ae, var(--treasure) 58%, #c88b13);
        box-shadow: 0 0 0 1px rgba(130, 89, 11, 0.12);
      }

      .player::after {
        content: "";
        position: absolute;
        width: 58%;
        height: 58%;
        border-radius: 50%;
        background: var(--player);
        box-shadow: 0 3px 8px rgba(15, 159, 143, 0.36);
      }

      .wheel {
        position: relative;
        width: 106px;
        height: 106px;
        margin: 12px auto 0;
        border: 1px solid rgba(25, 91, 105, 0.16);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 12px 28px rgba(36, 49, 66, 0.13);
        touch-action: none;
        user-select: none;
      }

      .wheel::before,
      .wheel::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        border-radius: 999px;
        background: rgba(24, 34, 53, 0.13);
        transform: translate(-50%, -50%);
      }

      .wheel::before {
        width: 76%;
        height: 2px;
      }

      .wheel::after {
        width: 2px;
        height: 76%;
      }

      .wheel-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffffff, #caeee9);
        border: 1px solid rgba(15, 159, 143, 0.34);
        box-shadow:
          0 10px 24px rgba(15, 121, 110, 0.16),
          inset 0 0 0 6px rgba(15, 159, 143, 0.12);
        transform: translate(-50%, -50%);
        transition: transform 90ms ease;
      }

      .wheel-label {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(24, 34, 53, 0.5);
        font-size: 0.68rem;
        font-weight: 800;
        pointer-events: none;
      }

      @media (max-width: 800px) {
        .sidebar {
          padding: 10px;
        }

        .settings-grid {
          grid-template-columns: 1fr;
        }

        .lede {
          display: none;
        }

        .maze-wrap {
          width: min(92vw, calc(100dvh - 275px), 560px);
        }

        .wheel {
          width: 98px;
          height: 98px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage panel">
        <div class="title-row">
          <h1>Maze Runner</h1>
        </div>
        <div class="status">
          <span id="status">Reach the exit</span>
          <span id="size-label">11 x 11</span>
        </div>
        <div class="maze-wrap">
          <div class="maze" id="maze" tabindex="0" aria-label="Maze board"></div>
        </div>
        <div class="wheel" id="wheel" aria-label="Direction wheel">
          <div class="wheel-label">MOVE</div>
          <div class="wheel-knob" id="wheel-knob"></div>
        </div>
      </section>

      <section class="sidebar panel" aria-label="Maze controls">
        <div class="settings-grid">
          <div class="field">
            <label>Difficulty</label>
            <div class="segmented" role="group" aria-label="Difficulty">
              <button class="active" type="button" data-difficulty="easy">Easy</button>
              <button type="button" data-difficulty="medium">Medium</button>
              <button type="button" data-difficulty="hard">Hard</button>
            </div>
          </div>

          <div class="field">
            <label>Mode</label>
            <div class="segmented two" role="group" aria-label="Mode">
              <button class="active" type="button" data-mode="escape">Escape</button>
              <button type="button" data-mode="treasure">Treasure</button>
            </div>
          </div>

          <button class="new-game" type="button" id="new-game">New Maze</button>
        </div>

        <div class="stats" aria-label="Game stats">
          <div><strong id="moves">0</strong><span>Moves</span></div>
          <div><strong id="timer">0</strong><span>Seconds</span></div>
          <div><strong id="treasures">0/0</strong><span>Treasure</span></div>
        </div>
      </section>
    </main>

    <script>
      const mazeEl = document.getElementById("maze");
      const statusEl = document.getElementById("status");
      const sizeLabel = document.getElementById("size-label");
      const movesEl = document.getElementById("moves");
      const timerEl = document.getElementById("timer");
      const treasuresEl = document.getElementById("treasures");
      const wheel = document.getElementById("wheel");
      const wheelKnob = document.getElementById("wheel-knob");
      const levels = {
        easy: { size: 11, treasure: 4 },
        medium: { size: 17, treasure: 7 },
        hard: { size: 23, treasure: 10 },
      };

      let difficulty = "easy";
      let mode = "escape";
      let grid = [];
      let player = { x: 1, y: 1 };
      let exit = { x: 1, y: 1 };
      let treasures = new Set();
      let collected = 0;
      let moves = 0;
      let seconds = 0;
      let timerId = 0;
      let finished = false;
      let touchStart = null;
      let activePointerId = null;
      let lastWheelMove = 0;

      function newMaze() {
        const size = levels[difficulty].size;
        grid = Array.from({ length: size }, () => Array(size).fill(1));
        carve(1, 1);
        player = { x: 1, y: 1 };
        exit = farthestOpenCell(size);
        treasures = new Set();
        collected = 0;
        moves = 0;
        seconds = 0;
        finished = false;
        if (mode === "treasure") placeTreasures(levels[difficulty].treasure);
        clearInterval(timerId);
        timerId = window.setInterval(() => {
          if (!finished) {
            seconds += 1;
            timerEl.textContent = seconds;
          }
        }, 1000);
        render();
        mazeEl.focus({ preventScroll: true });
      }

      function carve(x, y) {
        grid[y][x] = 0;
        const dirs = shuffle([
          [2, 0],
          [-2, 0],
          [0, 2],
          [0, -2],
        ]);
        for (const [dx, dy] of dirs) {
          const nx = x + dx;
          const ny = y + dy;
          if (ny > 0 && ny < grid.length - 1 && nx > 0 && nx < grid.length - 1 && grid[ny][nx] === 1) {
            grid[y + dy / 2][x + dx / 2] = 0;
            carve(nx, ny);
          }
        }
      }

      function shuffle(items) {
        return items
          .map((value) => ({ value, sort: Math.random() }))
          .sort((a, b) => a.sort - b.sort)
          .map((item) => item.value);
      }

      function farthestOpenCell(size) {
        const queue = [{ x: 1, y: 1, dist: 0 }];
        const seen = new Set(["1,1"]);
        let best = queue[0];
        for (let i = 0; i < queue.length; i += 1) {
          const current = queue[i];
          if (current.dist > best.dist) best = current;
          for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
            const nx = current.x + dx;
            const ny = current.y + dy;
            const key = `${nx},${ny}`;
            if (nx >= 0 && ny >= 0 && nx < size && ny < size && grid[ny][nx] === 0 && !seen.has(key)) {
              seen.add(key);
              queue.push({ x: nx, y: ny, dist: current.dist + 1 });
            }
          }
        }
        return { x: best.x, y: best.y };
      }

      function placeTreasures(count) {
        const cells = [];
        for (let y = 1; y < grid.length - 1; y += 1) {
          for (let x = 1; x < grid.length - 1; x += 1) {
            const reserved = (x === 1 && y === 1) || (x === exit.x && y === exit.y);
            if (grid[y][x] === 0 && !reserved) cells.push(`${x},${y}`);
          }
        }
        shuffle(cells).slice(0, count).forEach((key) => treasures.add(key));
      }

      function render() {
        mazeEl.innerHTML = "";
        mazeEl.style.gridTemplateColumns = `repeat(${grid.length}, 1fr)`;
        sizeLabel.textContent = `${grid.length} x ${grid.length}`;
        movesEl.textContent = moves;
        timerEl.textContent = seconds;
        treasuresEl.textContent = `${collected}/${treasures.size + collected}`;
        const canExit = mode === "escape" || treasures.size === 0;
        statusEl.textContent = finished
          ? `Solved in ${moves} moves`
          : canExit
            ? "Reach the exit"
            : "Collect every treasure";

        for (let y = 0; y < grid.length; y += 1) {
          for (let x = 0; x < grid.length; x += 1) {
            const tile = document.createElement("div");
            const key = `${x},${y}`;
            tile.className = `tile ${grid[y][x] ? "wall" : "path"}`;
            if (x === 1 && y === 1) tile.classList.add("start");
            if (x === exit.x && y === exit.y) tile.classList.add("exit");
            if (treasures.has(key)) tile.classList.add("treasure");
            if (x === player.x && y === player.y) tile.classList.add("player");
            mazeEl.appendChild(tile);
          }
        }
      }

      function move(dx, dy) {
        if (finished) return;
        const nx = player.x + dx;
        const ny = player.y + dy;
        if (!grid[ny] || grid[ny][nx] !== 0) return;
        player = { x: nx, y: ny };
        moves += 1;
        const key = `${nx},${ny}`;
        if (treasures.delete(key)) collected += 1;
        if (nx === exit.x && ny === exit.y && (mode === "escape" || treasures.size === 0)) {
          finished = true;
          clearInterval(timerId);
        }
        render();
      }

      document.addEventListener("keydown", (event) => {
        const keys = {
          ArrowUp: [0, -1],
          w: [0, -1],
          W: [0, -1],
          ArrowDown: [0, 1],
          s: [0, 1],
          S: [0, 1],
          ArrowLeft: [-1, 0],
          a: [-1, 0],
          A: [-1, 0],
          ArrowRight: [1, 0],
          d: [1, 0],
          D: [1, 0],
        };
        if (!keys[event.key]) return;
        event.preventDefault();
        move(...keys[event.key]);
      });

      function updateWheel(clientX, clientY) {
        const rect = wheel.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const distance = Math.hypot(dx, dy);
        const max = rect.width * 0.27;
        const scale = distance > max ? max / distance : 1;
        const knobX = dx * scale;
        const knobY = dy * scale;
        wheelKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;

        if (distance < 16) return;
        const now = performance.now();
        if (now - lastWheelMove < 130) return;
        lastWheelMove = now;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
        else move(0, dy > 0 ? 1 : -1);
      }

      function resetWheel() {
        wheelKnob.style.transform = "translate(-50%, -50%)";
      }

      wheel.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        activePointerId = event.pointerId;
        lastWheelMove = 0;
        wheel.setPointerCapture(activePointerId);
        updateWheel(event.clientX, event.clientY);
      });

      wheel.addEventListener("pointermove", (event) => {
        if (event.pointerId !== activePointerId) return;
        event.preventDefault();
        updateWheel(event.clientX, event.clientY);
      });

      function releaseWheel(event) {
        if (event.pointerId !== activePointerId) return;
        activePointerId = null;
        resetWheel();
      }

      wheel.addEventListener("pointerup", releaseWheel);
      wheel.addEventListener("pointercancel", releaseWheel);

      document.querySelectorAll("[data-difficulty]").forEach((button) => {
        button.addEventListener("click", () => {
          difficulty = button.dataset.difficulty;
          button.parentElement.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
          newMaze();
        });
      });

      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          mode = button.dataset.mode;
          button.parentElement.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
          newMaze();
        });
      });

      mazeEl.addEventListener("touchstart", (event) => {
        const touch = event.changedTouches[0];
        touchStart = { x: touch.clientX, y: touch.clientY };
      }, { passive: true });

      mazeEl.addEventListener("touchend", (event) => {
        if (!touchStart) return;
        const touch = event.changedTouches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        touchStart = null;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
        else move(0, dy > 0 ? 1 : -1);
      }, { passive: true });

      document.getElementById("new-game").addEventListener("click", newMaze);
      newMaze();
    </script>
  </body>
</html>
