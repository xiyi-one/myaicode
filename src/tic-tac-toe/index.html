<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --ink: #172033;
        --muted: #61708a;
        --line: #d7dfeb;
        --panel: #ffffff;
        --accent: #0f9f8f;
        --accent-strong: #08796e;
        --warm: #f59e0b;
        --danger: #e05252;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        padding: 14px;
        background:
          linear-gradient(135deg, rgba(15, 159, 143, 0.18), transparent 38%),
          linear-gradient(315deg, rgba(245, 158, 11, 0.18), transparent 42%),
          #eef4f8;
        color: var(--ink);
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(215, 223, 235, 0.9);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.14);
      }

      .controls {
        padding: 12px;
        box-shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
      }

      .game {
        padding: clamp(12px, 2.8vw, 20px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.25rem, 5vw, 2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .lede {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.9rem;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr)) auto;
        gap: 10px;
        align-items: end;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        color: #354258;
        font-size: 0.72rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        padding: 5px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f7fafc;
      }

      .segmented button,
      .actions button {
        min-height: 34px;
        border: 0;
        border-radius: 6px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .segmented button {
        background: transparent;
        color: var(--muted);
      }

      .segmented button.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 8px 18px rgba(15, 159, 143, 0.22);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions button {
        background: #172033;
        color: #fff;
      }

      .actions button.secondary {
        background: #e8eef5;
        color: #263247;
      }

      .score {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-top: 10px;
      }

      .score div {
        padding: 7px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(251, 253, 255, 0.62);
        text-align: center;
      }

      .score strong {
        display: block;
        font-size: 1rem;
      }

      .score span {
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 800;
      }

      .status {
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
        color: #354258;
        font-weight: 800;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: #e7f7f5;
        color: var(--accent-strong);
        white-space: nowrap;
      }

      .board {
        width: min(92vw, calc(100dvh - 220px), 500px);
        max-width: 100%;
        aspect-ratio: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-inline: auto;
      }

      .cell {
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 1;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #fdfefe;
        color: var(--ink);
        font-size: clamp(2.6rem, 16vw, 6.2rem);
        font-weight: 900;
        line-height: 1;
        cursor: pointer;
        transition:
          transform 130ms ease,
          border-color 130ms ease,
          background 130ms ease;
      }

      .cell:hover,
      .cell:focus-visible {
        border-color: var(--accent);
        transform: translateY(-1px);
        outline: none;
      }

      .cell.x {
        color: var(--accent-strong);
      }

      .cell.o {
        color: var(--warm);
      }

      .cell.oldest {
        border-color: var(--danger);
        background: #fff3f3;
      }

      .cell.win {
        background: #fff7df;
        border-color: var(--warm);
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      @media (max-width: 700px) {
        .controls {
          padding: 10px;
        }

        .settings-grid {
          grid-template-columns: 1fr;
        }

        .lede {
          display: none;
        }

        .board {
          width: min(92vw, calc(100dvh - 245px), 430px);
          gap: 7px;
        }

        .actions {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="game panel">
        <div class="title-row">
          <h1>Tic Tac Toe</h1>
        </div>
        <div class="status">
          <span id="status">X to move</span>
          <span class="badge" id="mode-badge">Classic</span>
        </div>
        <div class="board" id="board" aria-label="Tic Tac Toe board"></div>
        <p class="hint" id="hint">
          Dynamic mode keeps only six marks after the sixth move. The red tile is
          the next one to overflow.
        </p>
      </section>

      <section class="controls panel" aria-label="Game controls">
        <div class="settings-grid">
          <div class="field">
            <label>Opponent</label>
            <div class="segmented" role="group" aria-label="Opponent">
              <button class="active" type="button" data-setting="opponent" data-value="human">Human</button>
              <button type="button" data-setting="opponent" data-value="ai">AI</button>
            </div>
          </div>

          <div class="field">
            <label>Mode</label>
            <div class="segmented" role="group" aria-label="Mode">
              <button class="active" type="button" data-setting="mode" data-value="classic">Classic</button>
              <button type="button" data-setting="mode" data-value="dynamic">Dynamic</button>
            </div>
          </div>

          <div class="actions">
            <button type="button" id="new-round">New Round</button>
            <button class="secondary" type="button" id="reset-score">Reset Score</button>
          </div>
        </div>

        <div class="score" aria-label="Score">
          <div><strong id="x-score">0</strong><span>X Wins</span></div>
          <div><strong id="draw-score">0</strong><span>Draws</span></div>
          <div><strong id="o-score">0</strong><span>O Wins</span></div>
        </div>
      </section>
    </main>

    <script>
      const boardEl = document.getElementById("board");
      const statusEl = document.getElementById("status");
      const modeBadge = document.getElementById("mode-badge");
      const hintEl = document.getElementById("hint");
      const scoreEls = {
        X: document.getElementById("x-score"),
        O: document.getElementById("o-score"),
        draw: document.getElementById("draw-score"),
      };
      const wins = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      let board = Array(9).fill("");
      let history = [];
      let turn = "X";
      let locked = false;
      let winnerLine = [];
      let settings = { opponent: "human", mode: "classic" };
      let score = { X: 0, O: 0, draw: 0 };

      function render() {
        boardEl.innerHTML = "";
        const oldest = settings.mode === "dynamic" && history.length >= 6 ? history[0].index : -1;
        board.forEach((mark, index) => {
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = `cell ${mark.toLowerCase()}`;
          cell.textContent = mark;
          cell.setAttribute("aria-label", mark ? `${mark} at square ${index + 1}` : `Empty square ${index + 1}`);
          if (index === oldest && !locked) cell.classList.add("oldest");
          if (winnerLine.includes(index)) cell.classList.add("win");
          cell.addEventListener("click", () => play(index));
          boardEl.appendChild(cell);
        });

        modeBadge.textContent = settings.mode === "dynamic" ? "Dynamic overflow" : "Classic";
        hintEl.hidden = settings.mode !== "dynamic";
        updateStatus();
      }

      function updateStatus() {
        if (locked && winnerLine.length) {
          statusEl.textContent = `${board[winnerLine[0]]} wins`;
        } else if (locked) {
          statusEl.textContent = "Draw";
        } else if (settings.opponent === "ai" && turn === "O") {
          statusEl.textContent = "AI is thinking";
        } else {
          statusEl.textContent = `${turn} to move`;
        }
      }

      function play(index) {
        if (locked || board[index]) return;
        if (settings.opponent === "ai" && turn === "O") return;
        place(index, turn);
        finishMove();
      }

      function place(index, mark) {
        board[index] = mark;
        history.push({ index, mark });
        if (settings.mode === "dynamic" && history.length > 6) {
          const removed = history.shift();
          board[removed.index] = "";
        }
      }

      function finishMove() {
        const result = getResult();
        if (result.winner) {
          locked = true;
          winnerLine = result.line;
          score[result.winner] += 1;
          syncScore();
        } else if (settings.mode === "classic" && board.every(Boolean)) {
          locked = true;
          score.draw += 1;
          syncScore();
        } else {
          turn = turn === "X" ? "O" : "X";
          render();
          if (settings.opponent === "ai" && turn === "O" && !locked) {
            window.setTimeout(aiMove, 240);
          }
          return;
        }
        render();
      }

      function getResult(testBoard = board) {
        for (const line of wins) {
          const [a, b, c] = line;
          if (testBoard[a] && testBoard[a] === testBoard[b] && testBoard[a] === testBoard[c]) {
            return { winner: testBoard[a], line };
          }
        }
        return { winner: "", line: [] };
      }

      function aiMove() {
        if (locked) return;
        const index = pickAiMove();
        place(index, "O");
        finishMove();
      }

      function pickAiMove() {
        const empty = board.map((mark, index) => (mark ? -1 : index)).filter((index) => index >= 0);
        const tactical = findWinningMove("O") ?? findWinningMove("X");
        if (tactical !== null) return tactical;
        if (empty.includes(4)) return 4;
        const corners = [0, 2, 6, 8].filter((index) => empty.includes(index));
        if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
        return empty[Math.floor(Math.random() * empty.length)];
      }

      function findWinningMove(mark) {
        for (const index of board.map((value, idx) => (value ? -1 : idx)).filter((idx) => idx >= 0)) {
          const copy = board.slice();
          copy[index] = mark;
          if (getResult(copy).winner === mark) return index;
        }
        return null;
      }

      function newRound() {
        board = Array(9).fill("");
        history = [];
        turn = "X";
        locked = false;
        winnerLine = [];
        render();
      }

      function syncScore() {
        scoreEls.X.textContent = score.X;
        scoreEls.O.textContent = score.O;
        scoreEls.draw.textContent = score.draw;
      }

      document.querySelectorAll("[data-setting]").forEach((button) => {
        button.addEventListener("click", () => {
          settings[button.dataset.setting] = button.dataset.value;
          button.parentElement.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
          newRound();
        });
      });

      document.getElementById("new-round").addEventListener("click", newRound);
      document.getElementById("reset-score").addEventListener("click", () => {
        score = { X: 0, O: 0, draw: 0 };
        syncScore();
        newRound();
      });

      render();
    </script>
  </body>
</html>
